name: Code Sheriff AI Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Code Sheriff Review
        uses: ./.github/actions/codesheriff-review
        with:
          api-key: ${{ secrets.CODESHERIFF_API_KEY }}
